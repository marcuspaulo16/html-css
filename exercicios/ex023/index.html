<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tabela</title>
</head>
<body>
    <h1>Vamos Montar uma Tabela</h1>
    
    <!-- Hierarquia de Tabelas (simples)-->
     
        <!--
            <table> table = tabela

                <tr> table row = linha de tabela

                    <th> table header = cabeçalho de tabela
                    </th>

                    <td> table data = dado de tabela
                    </td>
                </tr> 

            <table>
        -->
    <!-- 
        Essas tags não precisam de fechamento, por isso se deve ter atenção aonde se coloca os dados da tabela, senão eles irão aparecer fora das celulas da tabela.
     -->

     <table class="tabela01">
        <tr>
            <td  class="tab01">A1</td>
            <td  class="tab01">B1</td>
            <td  class="tab01">C1</td>
            <td  class="tab01">D1</td>
            <td  class="tab01">E1</td>
        </tr>
        <tr>
            <td  class="tab01">A2</td>
            <td  class="tab01">B2</td>
            <td  class="tab01">C2</td>
            <td  class="tab01">D2</td>
        </tr>
        <tr>
            <td  class="tab01">A3</td>
            <td  class="tab01">B3</td>
            <td  class="tab01">C3</td>
        </tr>
        <tr>
            <td  class="tab01">A4</td>
            <td  class="tab01">B4</td>
        </tr>
        <tr>
            <td  class="tab01">A5</td>
        </tr>
     </table>
    <br>
    <h1>Segunda Tabela</h1>

    <table class="tabela02">
        <tr>
            <td class="hor01">A1</td>
            <td class="tab02">B1</td>
            <td class="tab02">C1</td>
        </tr>
        <tr>
            <td class="tab02">A2</td>
            <td class="center02">B2</td>
            <td class="tab02">C2</td>
        </tr>
        <tr>
            <td class="tab02">A3</td>
            <td class="tab02">B3</td>
            <td class="vert03">C3</td>
        </tr>
    </table>
</body>
</html>
