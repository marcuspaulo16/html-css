<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Para quebra de linha usar a tag br</p>
    <p>Exemplo: "O texto vai quebrar <br> agora"</p>
    <p>&lt;br&gt; é a tag</p>           
    
    <!--&lt; é igual a "<" e &gt; é igual a ">"-->

    <p>Para colocar emoji:
        &#x1F596;
        &#x1F913;
    </p>

    <!--"&#x" + Codigo do Emote (pegar no emojipedia.org)-->

</body>
</html>
