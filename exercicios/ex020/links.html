<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*
            Seletores Personalizados

            #   =  id
            .   =  class
            :   =  pseudo-class
            ::  =  pseudo-element
            >   =  children        
        
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: blue;

        }
        a:hover {
            color: rgb(115, 235, 137);
            
        }
        a:active {
            color: white;

        }
        a::after {
            content: '[Clique aqui]';
            text-decoration: none;
            font-weight: normal;
            color: black;

        }

    </style>
</head>
<body>
    <h1></h1>
    <ul>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Video</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>

    </ul>
</body>
</html>
